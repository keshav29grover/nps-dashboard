name: Daily NPS NAV Push Notification

on:
  schedule:
    # 11:15 PM IST = 17:45 UTC  (IST is UTC+5:30)
    - cron: '45 17 * * 1-5'    # Mon–Fri only
  workflow_dispatch:             # manual trigger for testing

jobs:
  send-nav-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios web-push

      - name: Send push notification
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:       ${{ secrets.VAPID_EMAIL }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: node scripts/sendNAVAlert.js
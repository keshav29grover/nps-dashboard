name: Daily NPS NAV Push Notification

on:
  schedule:
    - cron: '45 17 * * 1-5'
  workflow_dispatch:

jobs:
  send-nav-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios web-push

      - name: Check script exists
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in scripts/:"
          ls -la scripts/

      - name: Send push notification
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:       ${{ secrets.VAPID_EMAIL }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: node --experimental-vm-modules scripts/sendNAVAlert.js